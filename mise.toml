[tools]
go = "1.23"

# Loads GOOGLE_OAUTH_CLIENT_ID / _SECRET (and anything else) into the
# mise-managed environment so build tasks can bake them into the binary
# via -ldflags. The file is gitignored; missing is fine (the build just
# produces a binary without baked-in credentials).
[env]
_.file = ".env.local"
PROD_PROJECT = "domino-34fce"
STAGING_PROJECT = "domino-staging-dc209"
PROD_BUCKET = "gs://domino-34fce.firebasestorage.app"
STAGING_BUCKET = "gs://domino-staging-dc209.firebasestorage.app"

[tasks.generate]
description = "Generate Wails JS bindings from Go types"
run = "wails generate module"

[tasks."generate:changelog"]
description = "Generate frontend/src/generated/changelog.ts from CHANGELOG.md"
run = "go run ./scripts/generate-changelog/"

[tasks.build]
description = "Build Domino with Wails for the current platform"
depends = ["generate", "generate:changelog"]
run = '''
LDFLAGS="-X main.defaultGoogleOAuthClientID=${GOOGLE_OAUTH_CLIENT_ID:-} -X main.defaultGoogleOAuthClientSecret=${GOOGLE_OAUTH_CLIENT_SECRET:-}"
wails build -clean -ldflags "$LDFLAGS"
'''

[tasks."build:mac"]
description = "Build Domino for macOS (universal binary: amd64 + arm64)"
depends = ["generate", "generate:changelog"]
run = '''
LDFLAGS="-X main.defaultGoogleOAuthClientID=${GOOGLE_OAUTH_CLIENT_ID:-} -X main.defaultGoogleOAuthClientSecret=${GOOGLE_OAUTH_CLIENT_SECRET:-}"
wails build -clean -platform darwin/universal -ldflags "$LDFLAGS"
'''

[tasks."build:windows"]
description = "Build Domino for Windows (amd64)"
depends = ["generate", "generate:changelog"]
run = '''
LDFLAGS="-X main.defaultGoogleOAuthClientID=${GOOGLE_OAUTH_CLIENT_ID:-} -X main.defaultGoogleOAuthClientSecret=${GOOGLE_OAUTH_CLIENT_SECRET:-}"
wails build -clean -platform windows/amd64 -ldflags "$LDFLAGS"
'''

[tasks."build:linux"]
description = "Build Domino for Linux (amd64)"
depends = ["generate", "generate:changelog"]
run = '''
LDFLAGS="-X main.defaultGoogleOAuthClientID=${GOOGLE_OAUTH_CLIENT_ID:-} -X main.defaultGoogleOAuthClientSecret=${GOOGLE_OAUTH_CLIENT_SECRET:-}"
wails build -clean -platform linux/amd64 -ldflags "$LDFLAGS"
'''

[tasks."package:mac"]
description = "Package macOS build into a distributable .zip"
depends = ["build:mac"]
run = """
#!/usr/bin/env bash
set -euo pipefail

OUT_DIR="build/bin"
APP_NAME="Domino"
DIST_DIR="dist"

mkdir -p "$DIST_DIR"

ZIP_NAME="${APP_NAME}-macOS-universal.zip"

if [ -d "${OUT_DIR}/${APP_NAME}.app" ]; then
  cd "$OUT_DIR"
  zip -r "../../${DIST_DIR}/${ZIP_NAME}" "${APP_NAME}.app"
  cd ../..
  echo "Packaged: dist/${ZIP_NAME}"
else
  echo "Error: ${OUT_DIR}/${APP_NAME}.app not found. Run build:mac first." >&2
  exit 1
fi
"""

[tasks."package:windows"]
description = "Package Windows build into a distributable .zip"
depends = ["build:windows"]
run = """
#!/usr/bin/env bash
set -euo pipefail

OUT_DIR="build/bin"
APP_NAME="Domino"
DIST_DIR="dist"

mkdir -p "$DIST_DIR"

EXE="${OUT_DIR}/${APP_NAME}.exe"
ZIP_NAME="${APP_NAME}-Windows-amd64.zip"

if [ -f "$EXE" ]; then
  zip -j "${DIST_DIR}/${ZIP_NAME}" "$EXE"
  echo "Packaged: dist/${ZIP_NAME}"
else
  echo "Error: ${EXE} not found. Run build:windows first." >&2
  exit 1
fi
"""

[tasks."package:linux"]
description = "Package Linux build into a distributable .tar.gz"
depends = ["build:linux"]
run = """
#!/usr/bin/env bash
set -euo pipefail

OUT_DIR="build/bin"
APP_NAME="Domino"
DIST_DIR="dist"

mkdir -p "$DIST_DIR"

BIN="${OUT_DIR}/${APP_NAME}"
TAR_NAME="${APP_NAME}-Linux-amd64.tar.gz"

if [ -f "$BIN" ]; then
  tar -czf "${DIST_DIR}/${TAR_NAME}" -C "$OUT_DIR" "$APP_NAME"
  echo "Packaged: dist/${TAR_NAME}"
else
  echo "Error: ${BIN} not found. Run build:linux first." >&2
  exit 1
fi
"""

[tasks.package]
description = "Build and package Domino for macOS, Windows, and Linux"
depends = ["package:mac", "package:windows"] #"package:linux"]
run = """
#!/usr/bin/env bash
echo ""
echo "All distributions ready in dist/:"
ls -lh dist/
"""

# ── Firebase deploy ───────────────────────────────────────────────────────────

[tasks."firebase:deploy:rules:staging"]
description = "Deploy Firestore rules to staging"
run = "firebase deploy --only firestore:rules --project ${STAGING_PROJECT}"

[tasks."firebase:deploy:rules:prod"]
description = "Deploy Firestore rules to production"
run = "firebase deploy --only firestore:rules --project ${PROD_PROJECT}"

[tasks."firebase:deploy:indexes:staging"]
description = "Deploy Firestore indexes to staging"
run = "firebase deploy --only firestore:indexes --project ${STAGING_PROJECT}"

[tasks."firebase:deploy:indexes:prod"]
description = "Deploy Firestore indexes to production"
run = "firebase deploy --only firestore:indexes --project ${PROD_PROJECT}"

[tasks."firebase:deploy:firestore:staging"]
description = "Deploy Firestore rules and indexes to staging"
run = "firebase deploy --only firestore --project ${STAGING_PROJECT}"

[tasks."firebase:deploy:firestore:prod"]
description = "Deploy Firestore rules and indexes to production"
run = "firebase deploy --only firestore --project ${PROD_PROJECT}"

# ── Firestore backup / restore ────────────────────────────────────────────────
#
# Prerequisites:
#   - gcloud CLI authenticated: gcloud auth login
#   - gcloud application-default credentials: gcloud auth application-default login
#   - Both Firebase projects' default GCS buckets exist (created automatically
#     by Firebase; buckets are named <project-id>.appspot.com)
#
# Override PROD_BUCKET or STAGING_BUCKET in .env.local if your project uses
# the newer gs://<project-id>.firebasestorage.app format.

[tasks."firestore:export:prod"]
description = "Export production Firestore to its GCS bucket; prints the export path"
run = """
#!/usr/bin/env bash
set -euo pipefail

EXPORT_PATH="${PROD_BUCKET}/firestore-exports/$(date -u +%Y%m%dT%H%M%SZ)"

echo "Exporting production Firestore..."
echo "  Project : ${PROD_PROJECT}"
echo "  Path    : ${EXPORT_PATH}"
echo ""

gcloud firestore export "${EXPORT_PATH}" --project="${PROD_PROJECT}"

echo ""
echo "Export complete: ${EXPORT_PATH}"
echo ""
echo "To import into staging run:"
echo "  IMPORT_PATH=${EXPORT_PATH} mise run firestore:import:staging"
"""

[tasks."firestore:export:staging"]
description = "Export staging Firestore to its GCS bucket; prints the export path"
run = """
#!/usr/bin/env bash
set -euo pipefail

EXPORT_PATH="${STAGING_BUCKET}/firestore-exports/$(date -u +%Y%m%dT%H%M%SZ)"

echo "Exporting staging Firestore..."
echo "  Project : ${STAGING_PROJECT}"
echo "  Path    : ${EXPORT_PATH}"
echo ""

gcloud firestore export "${EXPORT_PATH}" --project="${STAGING_PROJECT}"

echo ""
echo "Export complete: ${EXPORT_PATH}"
echo ""
echo "To import into staging run:"
echo "  IMPORT_PATH=${EXPORT_PATH} mise run firestore:import:staging"
"""

[tasks."firestore:import:staging"]
description = "Import a Firestore export into the staging instance; set IMPORT_PATH=gs://... to the export folder"
run = """
#!/usr/bin/env bash
set -euo pipefail

IMPORT_PATH="${IMPORT_PATH:-}"

if [ -z "${IMPORT_PATH}" ]; then
  echo "Error: IMPORT_PATH is required." >&2
  echo "Usage: IMPORT_PATH=gs://.../firestore-exports/<timestamp> mise run firestore:import:staging" >&2
  exit 1
fi

echo "Importing into staging Firestore..."
echo "  Project     : ${STAGING_PROJECT}"
echo "  Import path : ${IMPORT_PATH}"
echo ""

gcloud firestore import "${IMPORT_PATH}" --project="${STAGING_PROJECT}"

echo ""
echo "Import complete."
"""

[tasks."firestore:copy-prod-to-staging"]
description = "Export production Firestore, copy it to the staging bucket, then import it into staging"
run = """
#!/usr/bin/env bash
set -euo pipefail

TIMESTAMP="$(date -u +%Y%m%dT%H%M%SZ)"
PROD_EXPORT_PATH="${PROD_BUCKET}/firestore-exports/${TIMESTAMP}"
STAGING_IMPORT_PATH="${STAGING_BUCKET}/firestore-exports/${TIMESTAMP}"

echo "=== Step 1/3  Export production ==="
echo "  Project : ${PROD_PROJECT}"
echo "  Path    : ${PROD_EXPORT_PATH}"
echo ""
gcloud firestore export "${PROD_EXPORT_PATH}" --project="${PROD_PROJECT}"

echo ""
echo "=== Step 2/3  Copy export to staging bucket ==="
echo "  From : ${PROD_EXPORT_PATH}"
echo "  To   : ${STAGING_IMPORT_PATH}"
echo ""
gsutil -m cp -r "${PROD_EXPORT_PATH}" "${STAGING_BUCKET}/firestore-exports/"

echo ""
echo "=== Step 3/3  Import into staging ==="
echo "  Project : ${STAGING_PROJECT}"
echo "  Path    : ${STAGING_IMPORT_PATH}"
echo ""
gcloud firestore import "${STAGING_IMPORT_PATH}" --project="${STAGING_PROJECT}"

echo ""
echo "Done. Production data is now live in staging (${STAGING_PROJECT})."
"""

# ── Firestore migrations ──────────────────────────────────────────────────────

[tasks."firestore:migrate-to-subcollections"]
description = "Migrate flat workspace arrays (projects/people/teams) to Firestore subcollections; requires FIREBASE_PROJECT_ID"
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ -z "${FIREBASE_PROJECT_ID:-}" ]; then
  echo "Error: FIREBASE_PROJECT_ID is required." >&2
  echo "Usage: FIREBASE_PROJECT_ID=domino-staging-dc209 mise run firestore:migrate-to-subcollections" >&2
  exit 1
fi

cd scripts/firestore
npm install --silent
FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID}" GOOGLE_CLOUD_PROJECT="${FIREBASE_PROJECT_ID}" \
  npx tsx migrate-to-subcollections.ts
"""

[tasks."firestore:migrate-users-to-email-keys"]
description = "Migrate users/{uid} → users/{email} and update workspace member keys; requires FIREBASE_PROJECT_ID"
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ -z "${FIREBASE_PROJECT_ID:-}" ]; then
  echo "Error: FIREBASE_PROJECT_ID is required." >&2
  echo "Usage: FIREBASE_PROJECT_ID=domino-staging-dc209 mise run firestore:migrate-users-to-email-keys" >&2
  exit 1
fi

cd scripts/firestore
npm install --silent
FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID}" npx tsx migrate-users-to-email-keys.ts
"""
