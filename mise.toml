[tools]
go = "1.23"

# Loads GOOGLE_OAUTH_CLIENT_ID / _SECRET (and anything else) into the
# mise-managed environment so build tasks can bake them into the binary
# via -ldflags. The file is gitignored; missing is fine (the build just
# produces a binary without baked-in credentials).
[env]
_.file = ".env.local"

[tasks.generate]
description = "Generate Wails JS bindings from Go types"
run = "wails generate module"

[tasks."generate:changelog"]
description = "Generate frontend/src/generated/changelog.ts from CHANGELOG.md"
run = "go run ./scripts/generate-changelog/"

[tasks.build]
description = "Build Domino with Wails for the current platform"
depends = ["generate", "generate:changelog"]
run = '''
LDFLAGS="-X main.defaultGoogleOAuthClientID=${GOOGLE_OAUTH_CLIENT_ID:-} -X main.defaultGoogleOAuthClientSecret=${GOOGLE_OAUTH_CLIENT_SECRET:-}"
wails build -clean -ldflags "$LDFLAGS"
'''

[tasks."build:mac"]
description = "Build Domino for macOS (universal binary: amd64 + arm64)"
depends = ["generate", "generate:changelog"]
run = '''
LDFLAGS="-X main.defaultGoogleOAuthClientID=${GOOGLE_OAUTH_CLIENT_ID:-} -X main.defaultGoogleOAuthClientSecret=${GOOGLE_OAUTH_CLIENT_SECRET:-}"
wails build -clean -platform darwin/universal -ldflags "$LDFLAGS"
'''

[tasks."build:windows"]
description = "Build Domino for Windows (amd64)"
depends = ["generate", "generate:changelog"]
run = '''
LDFLAGS="-X main.defaultGoogleOAuthClientID=${GOOGLE_OAUTH_CLIENT_ID:-} -X main.defaultGoogleOAuthClientSecret=${GOOGLE_OAUTH_CLIENT_SECRET:-}"
wails build -clean -platform windows/amd64 -ldflags "$LDFLAGS"
'''

[tasks."build:linux"]
description = "Build Domino for Linux (amd64)"
depends = ["generate", "generate:changelog"]
run = '''
LDFLAGS="-X main.defaultGoogleOAuthClientID=${GOOGLE_OAUTH_CLIENT_ID:-} -X main.defaultGoogleOAuthClientSecret=${GOOGLE_OAUTH_CLIENT_SECRET:-}"
wails build -clean -platform linux/amd64 -ldflags "$LDFLAGS"
'''

[tasks."package:mac"]
description = "Package macOS build into a distributable .zip"
depends = ["build:mac"]
run = """
#!/usr/bin/env bash
set -euo pipefail

OUT_DIR="build/bin"
APP_NAME="Domino"
DIST_DIR="dist"

mkdir -p "$DIST_DIR"

ZIP_NAME="${APP_NAME}-macOS-universal.zip"

if [ -d "${OUT_DIR}/${APP_NAME}.app" ]; then
  cd "$OUT_DIR"
  zip -r "../../${DIST_DIR}/${ZIP_NAME}" "${APP_NAME}.app"
  cd ../..
  echo "Packaged: dist/${ZIP_NAME}"
else
  echo "Error: ${OUT_DIR}/${APP_NAME}.app not found. Run build:mac first." >&2
  exit 1
fi
"""

[tasks."package:windows"]
description = "Package Windows build into a distributable .zip"
depends = ["build:windows"]
run = """
#!/usr/bin/env bash
set -euo pipefail

OUT_DIR="build/bin"
APP_NAME="Domino"
DIST_DIR="dist"

mkdir -p "$DIST_DIR"

EXE="${OUT_DIR}/${APP_NAME}.exe"
ZIP_NAME="${APP_NAME}-Windows-amd64.zip"

if [ -f "$EXE" ]; then
  zip -j "${DIST_DIR}/${ZIP_NAME}" "$EXE"
  echo "Packaged: dist/${ZIP_NAME}"
else
  echo "Error: ${EXE} not found. Run build:windows first." >&2
  exit 1
fi
"""

[tasks."package:linux"]
description = "Package Linux build into a distributable .tar.gz"
depends = ["build:linux"]
run = """
#!/usr/bin/env bash
set -euo pipefail

OUT_DIR="build/bin"
APP_NAME="Domino"
DIST_DIR="dist"

mkdir -p "$DIST_DIR"

BIN="${OUT_DIR}/${APP_NAME}"
TAR_NAME="${APP_NAME}-Linux-amd64.tar.gz"

if [ -f "$BIN" ]; then
  tar -czf "${DIST_DIR}/${TAR_NAME}" -C "$OUT_DIR" "$APP_NAME"
  echo "Packaged: dist/${TAR_NAME}"
else
  echo "Error: ${BIN} not found. Run build:linux first." >&2
  exit 1
fi
"""

[tasks.package]
description = "Build and package Domino for macOS, Windows, and Linux"
depends = ["package:mac", "package:windows"] #"package:linux"]
run = """
#!/usr/bin/env bash
echo ""
echo "All distributions ready in dist/:"
ls -lh dist/
"""

# ── Firebase deploy ───────────────────────────────────────────────────────────
#
# Prerequisites: firebase CLI installed and authenticated (firebase login).
# Projects are defined in .firebaserc:
#   default    → domino-staging-dc209
#   production → domino-34fce

[tasks."firebase:deploy:rules:staging"]
description = "Deploy Firestore rules to staging"
run = "firebase deploy --only firestore:rules --project default"

[tasks."firebase:deploy:rules:prod"]
description = "Deploy Firestore rules to production"
run = "firebase deploy --only firestore:rules --project production"

[tasks."firebase:deploy:indexes:staging"]
description = "Deploy Firestore indexes to staging"
run = "firebase deploy --only firestore:indexes --project default"

[tasks."firebase:deploy:indexes:prod"]
description = "Deploy Firestore indexes to production"
run = "firebase deploy --only firestore:indexes --project production"

[tasks."firebase:deploy:firestore:staging"]
description = "Deploy Firestore rules and indexes to staging"
run = "firebase deploy --only firestore --project default"

[tasks."firebase:deploy:firestore:prod"]
description = "Deploy Firestore rules and indexes to production"
run = "firebase deploy --only firestore --project production"

# ── Firestore migrations ──────────────────────────────────────────────────────

[tasks."firestore:migrate-users-to-email-keys"]
description = "Migrate users/{uid} → users/{email} and update workspace member keys; requires FIREBASE_PROJECT_ID"
run = """
#!/usr/bin/env bash
set -euo pipefail

if [ -z "${FIREBASE_PROJECT_ID:-}" ]; then
  echo "Error: FIREBASE_PROJECT_ID is required." >&2
  echo "Usage: FIREBASE_PROJECT_ID=domino-staging-dc209 mise run firestore:migrate-users-to-email-keys" >&2
  exit 1
fi

cd scripts/firestore
npm install --silent
FIREBASE_PROJECT_ID="${FIREBASE_PROJECT_ID}" npx tsx migrate-users-to-email-keys.ts
"""
