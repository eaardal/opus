name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Preview-channel comments require pull-requests: write; checks: write
# lets the Firebase action report status back on the PR.
permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Check formatting
        run: npm run format:check
        working-directory: frontend

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: frontend
      - name: Coverage summary
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f frontend/coverage/coverage-summary.json ]; then
            echo "No coverage data — tests may have failed before producing a report." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Test coverage"
            echo
            echo "| Metric | Covered / Total | % |"
            echo "| --- | ---: | ---: |"
            for metric in lines statements functions branches; do
              covered=$(jq ".total.${metric}.covered" frontend/coverage/coverage-summary.json)
              total=$(jq ".total.${metric}.total" frontend/coverage/coverage-summary.json)
              pct=$(jq ".total.${metric}.pct" frontend/coverage/coverage-summary.json)
              echo "| ${metric} | ${covered} / ${total} | ${pct}% |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend
        run: npm run build
        working-directory: frontend
      - name: Upload built dist as an artifact for the deploy job
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          retention-days: 7

  deploy:
    name: Deploy
    needs: [format, lint, test, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download built dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      # PR pushes land in an ephemeral per-PR preview channel and the
      # action comments the URL on the PR. Master pushes go to 'live'.
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: domino-34fce
          channelId: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && 'live' || '' }}

      # Rules + indexes only ship on master pushes, never from PRs —
      # otherwise a contributor could open a PR that weakens access
      # control, and preview-channel runs would apply it to prod.
      - name: Authenticate to Google Cloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Show firestore indexes
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: npx firebase-tools@13 firestore:indexes

      - name: Deploy Firestore rules and indexes
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: npx firebase-tools@13 deploy --only firestore:rules,firestore:indexes --project domino-34fce --non-interactive
