name: CI / Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Preview-channel comments require pull-requests: write; checks: write
# lets the Firebase action report status back on the PR.
permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Check formatting
        run: npm run format:check
        working-directory: frontend

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Lint
        run: npm run lint
        working-directory: frontend

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Run tests with coverage
        run: npm run test:coverage
        working-directory: frontend
      - name: Coverage summary
        if: always()
        run: |
          set -euo pipefail
          if [ ! -f frontend/coverage/coverage-summary.json ]; then
            echo "No coverage data — tests may have failed before producing a report." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Test coverage"
            echo
            echo "| Metric | Covered / Total | % |"
            echo "| --- | ---: | ---: |"
            for metric in lines statements functions branches; do
              covered=$(jq ".total.${metric}.covered" frontend/coverage/coverage-summary.json)
              total=$(jq ".total.${metric}.total" frontend/coverage/coverage-summary.json)
              pct=$(jq ".total.${metric}.pct" frontend/coverage/coverage-summary.json)
              echo "| ${metric} | ${covered} / ${total} | ${pct}% |"
            done
          } >> "$GITHUB_STEP_SUMMARY"

  build-staging:
    name: Build (staging)
    needs: [format, lint, test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend (staging)
        run: npm run build -- --mode staging
        working-directory: frontend
      - name: Upload staging dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-staging
          path: frontend/dist
          retention-days: 7

  build-production:
    name: Build (production)
    needs: [format, lint, test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend
      - name: Build frontend (production)
        run: npm run build
        working-directory: frontend
      - name: Upload production dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist-production
          path: frontend/dist
          retention-days: 7

  deploy-pr-preview:
    name: Deploy PR Preview (staging)
    needs: [build-staging]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download staging dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-staging
          path: frontend/dist
      - name: Deploy preview to Firebase Hosting (staging)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
          projectId: domino-staging-dc209

  deploy-staging:
    name: Deploy to Staging
    needs: [build-staging]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download staging dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-staging
          path: frontend/dist

      - name: Deploy to Firebase Hosting (staging)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}
          projectId: domino-staging-dc209
          channelId: live

      # Rules + indexes only ship on master pushes, never from PRs —
      # otherwise a contributor could open a PR that weakens access
      # control, and preview-channel runs would apply it to staging.
      - name: Authenticate to Google Cloud (staging)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING }}

      - name: Deploy Firestore rules and indexes (staging)
        run: npx firebase-tools@13 deploy --only firestore:rules,firestore:indexes --project domino-staging-dc209 --non-interactive --force

  deploy-production:
    name: Deploy to Production
    needs: [deploy-staging, build-production]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    environment: production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download production dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist-production
          path: frontend/dist

      - name: Deploy to Firebase Hosting (production)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRODUCTION }}
          projectId: domino-34fce
          channelId: live

      - name: Authenticate to Google Cloud (production)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRODUCTION }}

      - name: Deploy Firestore rules and indexes (production)
        run: npx firebase-tools@13 deploy --only firestore:rules,firestore:indexes --project domino-34fce --non-interactive --force
