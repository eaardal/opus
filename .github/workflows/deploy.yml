name: Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Preview-channel comments require pull-requests: write; checks: write
# lets the Firebase action report status back on the PR.
permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: deploy-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # PR pushes land in an ephemeral per-PR preview channel and the
      # action comments the URL on the PR. Master pushes go to 'live'.
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: domino-34fce
          channelId: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && 'live' || '' }}

      # Rules + indexes only ship on master pushes, never from PRs —
      # otherwise a contributor could open a PR that weakens access
      # control, and preview-channel runs would apply it to prod.
      - name: Authenticate to Google Cloud
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Deploy Firestore rules and indexes
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: npx firebase-tools@13 deploy --only firestore:rules,firestore:indexes --project domino-34fce --non-interactive
